  build_windows_Android:
    needs: generate_version_number
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install workload android
      run: |
        dotnet workload install android
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.3
    - name: Set Android version
      uses: damienaicheh/update-android-version-manifest-action@v1.0.0
      with:
        android-manifest-path: ./HugeMazes.MonoGame.Android/AndroidManifest.xml
        version-name: 1.0.${{needs.generate_version_number.outputs.build_number}}
        version-code: ${{needs.generate_version_number.outputs.build_number}}
        print-file: true
    - name: Restore NuGet packages
      run: |
        nuget restore HugeMazes/HugeMazes.csproj
        nuget restore HugeMazes.MonoGame.Core/HugeMazes.MonoGame.Core.csproj
        nuget restore HugeMazes.MonoGame.Android/HugeMazes.MonoGame.Android.csproj
