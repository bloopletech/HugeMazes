  release_github:
    needs: [
      generate_version_number,
      build_linux_consoleapp,
      build_windows_consoleapp,
      build_linux_with_sonarqube,
      build_linux,
      build_docker,
      build_linux_monogame_desktopgl,
      build_windows_monogame_desktopgl_onlinux,
      build_windows_monogame_desktopgl,
      build_windows_monogame_windowsdx,
      build_windows_Android,
      build_windows_AndroidForFireStick]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts/

    - name: Display structure of downloaded files
      run: |
        cd ./artifacts/
        ls -R
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: 1.0.${{needs.generate_version_number.outputs.build_number}}
        release_name: 1.0.${{needs.generate_version_number.outputs.build_number}}
        body: |
          ${{ github.event.head_commit.message }}
        draft: false
        prerelease: false
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: 1.0.${{needs.generate_version_number.outputs.build_number}}
        files: |
          ./artifacts/HugeMazes7z/HugeMazes.7z
          ./artifacts/HugeMazesZip/HugeMazes.zip
          ./artifacts/HugeMazesNuGet/*.nupkg
          ./artifacts/HugeMazesNuGet/*.snupkg
          ./artifacts/HugeMazes.MonoGame.DesktopGL_linux-x64/HugeMazes.MonoGame.DesktopGL_linux-x64.tar.gz
          ./artifacts/HugeMazes.MonoGame.DesktopGL_win-x64_onlinux/HugeMazes.MonoGame.DesktopGL_win-x64_onlinux.7z
          ./artifacts/HugeMazes.MonoGame.DesktopGL_win-x64/HugeMazes.MonoGame.DesktopGL_win-x64.7z
          ./artifacts/HugeMazes.MonoGame.WindowsDX_win-x64/HugeMazes.MonoGame.WindowsDX_win-x64.7z
          ./artifacts/HugeMazes.MonoGame.Android_aab/devemazegeneratorcoremonogame_android.devemazegeneratorcoremonogame_android-Signed.aab
          ./artifacts/HugeMazes.MonoGame.Android_apk/devemazegeneratorcoremonogame_android.devemazegeneratorcoremonogame_android-Signed.apk
          ./artifacts/HugeMazes.ConsoleApp.Windows/DeveMazeGenerator.ConsoleApp.Untrimmed.exe
          ./artifacts/HugeMazes.ConsoleApp.Windows/DeveMazeGenerator.ConsoleApp.Trimmed.exe
          ./artifacts/HugeMazes.ConsoleApp.Windows/DeveMazeGenerator.ConsoleApp.TrimmedAot.exe
          ./artifacts/HugeMazes.ConsoleApp.Linux/DeveMazeGenerator.ConsoleApp.Untrimmed
          ./artifacts/HugeMazes.ConsoleApp.Linux/DeveMazeGenerator.ConsoleApp.Trimmed
          ./artifacts/HugeMazes.ConsoleApp.Linux/DeveMazeGenerator.ConsoleApp.TrimmedAot
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  release_nuget:
    needs: [generate_version_number, build_linux_with_sonarqube, build_linux, build_docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        name: HugeMazesNuGet
        path: ./artifacts/HugeMazesNuGet/
    - name: Push NuGet
      run: dotnet nuget push ./artifacts/HugeMazesNuGet/HugeMazes.1.0.${{needs.generate_version_number.outputs.build_number}}.nupkg -k ${{ secrets.NUGETTOKEN }} -s https://api.nuget.org/v3/index.json

  codeqlanalyze:
    runs-on: windows-latest
    needs: generate_version_number
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp', 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install workload android
      run: |
        dotnet workload install android

    - name: Run tree
      run: tree /A

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: './artifacts'
  
    - name: Run tree2
      run: |
        tree /A
        cd
  
    - name: Upload CodeQL Database as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodeQLDatabase-${{ matrix.language }}
        path: ${{ runner.temp }}/codeql_databases/${{ matrix.language }}.zip
