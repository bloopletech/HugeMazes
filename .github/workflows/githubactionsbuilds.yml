    - name: 7zip output
      run: |
        7z a -t7z -m0=LZMA2 -mmt=on -mx9 -md=1536m -mfb=273 -ms=on -mqs=on -sccUTF-8 "HugeMazes.MonoGame.DesktopGL_win-x64_onlinux.7z" "./HugeMazes.MonoGame.DesktopGL/bin/Release/net8.0/win-x64/publish/*" '-x!*.pdb'
    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazes.MonoGame.DesktopGL_win-x64_onlinuxtargz
        path: HugeMazes.MonoGame.DesktopGL_win-x64_onlinux.tar.gz
    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazes.MonoGame.DesktopGL_win-x64_onlinux
        path: HugeMazes.MonoGame.DesktopGL_win-x64_onlinux.7z

