name: GitHubActionsBuilds

on: push

jobs:
  extract-version:
    runs-on: windows-latest
    outputs:
      APP_VERSION: ${{ steps.extract-app-version.outputs.APP_VERSION }}
    steps:
    - run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

    - uses: actions/checkout@v6
    
    - name: Extract App Version
      id: extract-app-version
      run: $version = (Select-Xml -Path HugeMazes.ConsoleApp/HugeMazes.ConsoleApp.csproj -XPath '//Version[1]/text()[1]').Node.InnerText; "APP_VERSION=$version" >> "$env:GITHUB_OUTPUT"

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        # Look to see if there is a cache hit for the corresponding requirements file
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget

    - name: Build
      run: dotnet publish HugeMazes.ConsoleApp/HugeMazes.ConsoleApp.csproj -r linux-x64

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: build-linux
        path: |
          HugeMazes.ConsoleApp/bin/Release/linux-x64/publish/*

  build-windows:
    runs-on: windows-latest
    steps:
    - run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        # Look to see if there is a cache hit for the corresponding requirements file
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget

    - name: Build
      run: dotnet publish HugeMazes.ConsoleApp/HugeMazes.ConsoleApp.csproj -r win-x64

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: build-windows
        path: |
          HugeMazes.ConsoleApp/bin/Release/win-x64/publish/*

  release-github:
    needs: [
      extract-version,
      build-linux,
      build-windows]
    runs-on: windows-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: Display structure of downloaded files
      run: |
        cd ./
        ls -R

    - name: Release
      env:
        APP_VERSION: ${{needs.extract-version.outputs.APP_VERSION}}
      uses: softprops/action-gh-release@v3
      with:
        prerelease: true
        tag_name: v${{ env.APP_VERSION }}
        files: "*"