    - name: Publish
      run: dotnet publish ./HugeMazes.MonoGame.DesktopGL/HugeMazes.MonoGame.DesktopGL.csproj -r linux-x64 -c Release /p:PublishSingleFile=true /p:SelfContained=true /p:IncludeNativeLibrariesForSelfExtract=true /p:PublishTrimmed=false /p:Version=1.0.${{needs.generate_version_number.outputs.build_number}}
    - name: Copy files that are missing for some reason
      run: |
        # not needed on linux as it seems
        ls -R HugeMazes.MonoGame.DesktopGL/bin/Release/net8.0/linux-x64
        ls -R HugeMazes.MonoGame.DesktopGL/bin/Release/net8.0/linux-x64/publish
      shell: bash
    - name: targz output
      run: |
        export GZIP=-9
        tar cvzf HugeMazes.MonoGame.DesktopGL_linux-x64.tar.gz -C HugeMazes.MonoGame.DesktopGL/bin/Release/net8.0/linux-x64/publish .
    - name: 7zip output
