    - name: Publish Trimmed
      run: dotnet publish HugeMazes.ConsoleApp/HugeMazes.ConsoleApp.csproj -c Release -r win-x64 -o HugeMazes.ConsoleApp/bin/Release/net8.0/win-x64/publishtrimmed/ /p:PublishSingleFile=true /p:SelfContained=true /p:PublishTrimmed=true /p:TrimMode=full /p:Version=1.0.${{needs.generate_version_number.outputs.build_number}}
    - name: Publish Trimmed AOT
      run: dotnet publish HugeMazes.ConsoleApp/HugeMazes.ConsoleApp.csproj -c Release -r win-x64 -o HugeMazes.ConsoleApp/bin/Release/net8.0/win-x64/publishtrimmedaot/ /p:PublishTrimmed=true /p:TrimMode=full /p:PublishAot=true /p:Version=1.0.${{needs.generate_version_number.outputs.build_number}}
    - name: Copy output
      shell: bash
      run: |
        mkdir BuildOutputConsole
        mv ./HugeMazes.ConsoleApp/bin/Release/net8.0/win-x64/publishuntrimmed/DeveMazeGenerator.ConsoleApp.exe ./BuildOutputConsole/DeveMazeGenerator.ConsoleApp.Untrimmed.exe
        mv ./HugeMazes.ConsoleApp/bin/Release/net8.0/win-x64/publishtrimmed/DeveMazeGenerator.ConsoleApp.exe ./BuildOutputConsole/DeveMazeGenerator.ConsoleApp.Trimmed.exe
        mv ./HugeMazes.ConsoleApp/bin/Release/net8.0/win-x64/publishtrimmedaot/DeveMazeGenerator.ConsoleApp.exe ./BuildOutputConsole/DeveMazeGenerator.ConsoleApp.TrimmedAot.exe
    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazes.ConsoleApp.Windows
        path: BuildOutputConsole/*.exe


  build_linux_with_sonarqube:
    needs: generate_version_number
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '19' # The JDK version to make available on the path.
        java-package: jdk # (jre, jdk, or jdk+fx) - defaults to jdk
        architecture: x64 # (x64 or x86) - defaults to x64
    - name: Install tools
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet tool install --global dotnet-reportgenerator-globaltool
    - name: Install dependencies
      run: dotnet restore HugeMazes.sln
    - name: SonarQube begin
      if: github.actor != 'dependabot[bot]'
      run: dotnet-sonarscanner begin /k:"HugeMazes" /o:"devedse-github" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.login=${{secrets.SONARQUBETOKEN}} /d:sonar.cs.opencover.reportsPaths=".\HugeMazes.Tests\TestResults\Coverage\coverage.opencover.xml" /d:sonar.coverage.exclusions="HugeMazes.ConsoleApp/**/*.cs,HugeMazes.Tests/**/*.cs,HugeMazes.Web/wwwroot/divisionmaze/**/*.js"
    - name: Build
      run: dotnet build HugeMazes.sln -c Release --no-restore /p:Version=1.0.${{needs.generate_version_number.outputs.build_number}}
    - name: Test
      run: dotnet test HugeMazes.sln --verbosity normal --no-build -c Release --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover
    - name: SonarQube end
      if: github.actor != 'dependabot[bot]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login=${{secrets.SONARQUBETOKEN}}
    - name: Pack
      run: dotnet pack HugeMazes/HugeMazes.csproj --verbosity normal --no-build -c Release /p:Version=1.0.${{needs.generate_version_number.outputs.build_number}}
    - name: Run CodeCov
      uses: codecov/codecov-action@v4
      with:
        directory: ./HugeMazes.Tests/TestResults
        fail_ci_if_error: true # optional (default = false)
        verbose: true # optional (default = false)
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Package HugeMazes
      run: |
        # Create output directory
        mkdir -p Scripts/Output
        
        # Remove existing files if they exist
        rm -f Scripts/Output/HugeMazes.7z
        rm -f Scripts/Output/HugeMazes.zip
        
        # Package the build output
        cd HugeMazes/bin/Release
        
        # Create zip file (excluding .pdb files)
        zip -r ../../../Scripts/Output/HugeMazes.zip . -x "*.pdb"
        
        # Create 7z file (excluding .pdb files)
        7z a -t7z -m0=LZMA2 -mmt=on -mx9 -md=1536m -mfb=273 -ms=on -mqs=on -sccUTF-8 "../../../Scripts/Output/HugeMazes.7z" . -x!"*.pdb"
      shell: bash


    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazes7z
        path: ./Scripts/Output/HugeMazes.7z
    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazesZip
        path: ./Scripts/Output/HugeMazes.zip
    - uses: actions/upload-artifact@v4
      with:
        name: HugeMazesNuGet
        path: |
          ./HugeMazes/bin/Release/*.nupkg
          ./HugeMazes/bin/Release/*.snupkg

